name: ERP V2 Live Pipeline

on:
  schedule:
    # Every 5 minutes — GitHub Actions minimum practical cadence for cron
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: erp-v2-live-pipeline
  cancel-in-progress: false

jobs:
  live-pipeline:
    name: Live pipeline (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Stale pipeline alert (pre-run)
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ERP_V2_DB_WRITE: ${{ secrets.ERP_V2_DB_WRITE }}
          PIPELINE_ALERT_EMAIL: ${{ secrets.PIPELINE_ALERT_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          PIPELINE_ALERT_FROM: ${{ secrets.PIPELINE_ALERT_FROM }}
        run: npm run m5:stale:check

      - name: Run monitored pipeline once
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ERP_V2_DB_WRITE: ${{ secrets.ERP_V2_DB_WRITE }}
          TIENDANUBE_STORE_ID: ${{ secrets.TIENDANUBE_STORE_ID }}
          TIENDANUBE_ACCESS_TOKEN: ${{ secrets.TIENDANUBE_ACCESS_TOKEN }}
          TIENDANUBE_USER_AGENT: ${{ secrets.TIENDANUBE_USER_AGENT }}
          MP_ACCESS_TOKEN: ${{ secrets.MP_ACCESS_TOKEN }}
          PIPELINE_ALERT_EMAIL: ${{ secrets.PIPELINE_ALERT_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          PIPELINE_ALERT_FROM: ${{ secrets.PIPELINE_ALERT_FROM }}
        run: ERP_V2_DB_WRITE=true npm run m5:scheduler:once
